<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Admin Panel</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen p-6">

  <h1 class="text-4xl font-bold mb-8">
    Admin Dashboard
  </h1>
   <!-- ADMIN STATS -->

  <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">

    <div class="bg-card p-5 rounded-2xl border border-border">
      <p class="text-muted text-sm">Total Bookings</p>
      <h2 id="total-bookings" class="text-3xl font-bold mt-2">0</h2>
    </div>

    <div class="bg-card p-5 rounded-2xl border border-border">
      <p class="text-muted text-sm">Completed</p>
      <h2 id="completed-bookings" class="text-3xl font-bold mt-2">0</h2>
    </div>

    <div class="bg-card p-5 rounded-2xl border border-border">
      <p class="text-muted text-sm">Upcoming</p>
      <h2 id="upcoming-bookings" class="text-3xl font-bold mt-2">0</h2>
    </div>

    <div class="bg-card p-5 rounded-2xl border border-border">
      <p class="text-muted text-sm">Contact Messages</p>
      <h2 id="total-contacts" class="text-3xl font-bold mt-2">0</h2>
    </div>

  </div>

  <!-- BOOKINGS -->

  <div class="mb-14">

    <h2 class="text-2xl font-semibold mb-5">
      All Bookings
    </h2>

    <div id="admin-bookings">

      <p>Loading bookings...</p>

    </div>

  </div>

  <!-- CONTACTS -->

  <div>

    <h2 class="text-2xl font-semibold mb-5">
      Contact Messages
    </h2>

    <div id="admin-contacts">

      <p>Loading contacts...</p>

    </div>

  </div>

  <script src="js/admin.js"></script>

</body>

</html>
